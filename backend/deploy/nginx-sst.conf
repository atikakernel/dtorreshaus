# ====================================
# NGINX CONFIG: sst.dtorreshaus.com
# Proxy para GTM Server Side (Docker)
# ====================================

server {
    listen 80;
    listen [::]:80;
    server_name sst.dtorreshaus.com;

    # Logs
    access_log /var/log/nginx/gtm-sst-access.log;
    error_log /var/log/nginx/gtm-sst-error.log;

    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        
        # Headers necesarios para GTM
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts largos para streaming/eventos
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

