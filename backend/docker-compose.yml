version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dtorreshaus_postgres
    environment:
      POSTGRES_USER: dtorreshaus
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: dtorreshaus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
