name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Frontend Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Deploy to EC2
        run: |
          # 1. Actualizar el código en el servidor y luego ejecutar despliegue
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "bash -c 'cd /var/www/dtorreshaus/dtorreshaus && git fetch origin main && git reset --hard origin/main && chmod +x *.sh && sed -i \"s/\\r\$//\" *.sh && ./run_ec2_deploy.sh'"
          
          # 2. Configurar GTM Server Side
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "bash -c 'cd /var/www/dtorreshaus/dtorreshaus && ./setup-gtm-server.sh'"

          # 3. Desplegar frontend (usando scp)
          scp -o StrictHostKeyChecking=no -r dist/* ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/frontend-deploy/
          
          # 4. Finalizar despliegue frontend en el servidor
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "bash -c 'cd /var/www/dtorreshaus/dtorreshaus && ./deploy-frontend.sh'"
